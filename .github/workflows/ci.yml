name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: web/yarn.lock

      - name: Restore .NET
        run: dotnet restore TradingSimulator.slnx

      - name: Verify .NET formatting
        run: dotnet format TradingSimulator.slnx --verify-no-changes

      - name: Build .NET
        run: dotnet build TradingSimulator.slnx --no-restore -c Release

      - name: Install frontend dependencies
        run: yarn --cwd web install --frozen-lockfile

      - name: Verify OpenAPI contract matches API
        run: yarn --cwd web api:verify

      - name: Test .NET (unit tests only)
        run: dotnet test TradingSimulator.slnx --no-build -c Release --verbosity normal --logger "trx;LogFileName=test-results.trx" --filter "FullyQualifiedName!~TradingSimulator.Api.IntegrationTests"

      - name: Lint frontend
        run: yarn --cwd web lint

      - name: Check frontend formatting
        run: yarn --cwd web format:check

      - name: Build frontend
        run: yarn --cwd web build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"
