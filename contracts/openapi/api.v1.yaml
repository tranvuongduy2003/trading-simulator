          description: Conflict
        "500":
          description: Internal Server Error
      tags:
        - Portfolio
  /api/trades:
    get:
      operationId: GetMyTradeHistory
      parameters:
        - in: query
          name: pageNumber
          schema:
            format: int32
            pattern: ^-?(?:0|[1-9]\d*)$
